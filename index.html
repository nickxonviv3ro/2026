<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
  <title>Living Testimonies - Youth Ministry | Cinematic Gallery</title>
  <meta name="description" content="Youth Ministry Portfolio - Cinematic Style" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: "Inter", sans-serif;
      color: rgba(255, 255, 255, 0.85);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ============================================ */
    /* CUSTOM LIGHTBOX - SIMPLE, NO SWIPE */
    /* ============================================ */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(20px);
      z-index: 99999;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 30px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .lightbox-overlay.active {
      display: flex;
      opacity: 1;
    }

    .lightbox-content {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: scale(0.95);
      transition: transform 0.4s ease;
    }

    .lightbox-overlay.active .lightbox-content {
      transform: scale(1);
    }

    .lightbox-content img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100000;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .lightbox-close:hover {
      background: #ffd700;
      color: #000;
      transform: rotate(90deg);
      border-color: #ffd700;
    }

    .lightbox-caption {
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
      font-family: monospace;
      text-align: center;
      white-space: nowrap;
      background: rgba(0,0,0,0.6);
      padding: 6px 16px;
      border-radius: 6px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,215,0,0.1);
    }

    .lightbox-caption .title {
      color: #ffd700;
      font-weight: 600;
    }

    /* ============================================ */
    /* LOADING SCREEN */
    /* ============================================ */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-content {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .loading-logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 12px;
      animation: floatGlow 2.4s ease-in-out infinite;
    }

    .loading-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    @keyframes floatGlow {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.04); }
      100% { transform: translateY(0) scale(1); }
    }

    .loading-text {
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 3px;
      margin-bottom: 16px;
      font-family: "Playfair Display", serif;
    }

    .loading-screen.hide {
      opacity: 0;
      visibility: hidden;
    }

    .main-content {
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .main-content.show {
      opacity: 1;
    }

    /* COLOR THEME */
    :root {
      --cinema-color: #ffd700;
      --gold: #f5c542;
      --gold-dim: rgba(245, 197, 66, 0.12);
      --gold-hover: rgba(245, 197, 66, 0.25);
      --bg-body: #08080c;
      --bg-card: #111118;
      --bg-card-hover: #191925;
      --border-light: rgba(255, 255, 255, 0.04);
      --text-white: #f0f0f2;
      --text-gray: #a0a0aa;
      --text-dim: #606070;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 12px 0;
      background: transparent;
      transition: all 0.3s ease;
    }

    .navbar.scrolled {
      padding: 8px 0;
      background: rgba(8, 8, 12, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .navbar .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .navbar .logo img {
      width: 26px;
      height: 26px;
      object-fit: contain;
    }

    .navbar .logo h1 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-white);
      margin: 0;
      letter-spacing: -0.3px;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    .navbar .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      list-style: none;
      margin: 0;
    }

    .navbar .nav-links a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.75rem;
      transition: color 0.3s;
      position: relative;
      padding: 3px 0;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .navbar .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--gold);
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    .navbar .nav-links a:hover::after,
    .navbar .nav-links a.active::after {
      width: 100%;
    }

    .navbar .nav-links a:hover,
    .navbar .nav-links a.active {
      color: var(--text-white);
    }

    .navbar .mobile-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-white);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    /* YOUTH OFFICERS - FIXED BACKGROUND */
    .youth-officers-section { 
      padding: 100px 100px; 
      position: relative; 
      overflow: hidden;
      isolation: isolate;
    }

    .youth-officers-section::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: url("img/Background.png");
  background-size: cover;
  background-position: center 70%;  /* ← Adjust this value */
  background-repeat: no-repeat;
  background-attachment: fixed;     /* ← Keep if you want it fixed */
  z-index: -2;
}

    .youth-officers-section::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .youth-officers-section .container { 
      position: relative; 
      z-index: 1; 
    }

    .section-title { 
      text-align: center; 
      margin-bottom: 40px; 
    }

    .section-title h2 { 
      font-size: 1.8rem; 
      font-weight: 800; 
      color: white; 
      letter-spacing: 1px; 
    }

    .section-title h2 span { 
      color: var(--cinema-color); 
      position: relative; 
      display: inline-block; 
    }

    .section-title h2 span::after { 
      content: ""; 
      position: absolute; 
      bottom: -6px; 
      left: 0; 
      right: 0; 
      height: 2px; 
      background: linear-gradient(90deg, transparent, var(--cinema-color), transparent); 
    }

    .section-title p { 
      color: rgba(255, 255, 255, 0.6); 
      margin-top: 8px; 
      font-size: 0.8rem;
    }

    .officers-grid { 
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      max-width: 1200px; 
      margin: 0 auto; 
      position: relative; 
      z-index: 2; 
      padding: 0 16px;
    }

    .officer-card {
      position: relative;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .card-inner {
      position: relative;
      background: rgba(20, 20, 30, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px 14px 16px;
      border: 1px solid rgba(255, 215, 0, 0.1);
      transition: all 0.3s ease;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .officer-card:hover .card-inner { 
      transform: translateY(-4px); 
      background: rgba(30, 30, 45, 0.9); 
      border-color: rgba(255, 215, 0, 0.3); 
    }

    .avatar-frame { 
      position: relative; 
      width: 110px; 
      height: 110px; 
      margin: -40px auto 10px; 
      z-index: 10; 
      border-radius: 50%; 
      overflow: hidden; 
    }

    .avatar { 
      position: relative; 
      width: 100%; 
      height: 100%; 
      border-radius: 50%; 
      overflow: visible; 
    }

    .avatar img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      border-radius: 50%; 
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5); 
      transition: all 0.3s ease; 
    }

    .officer-card:hover .avatar img { 
      transform: scale(1.05); 
      box-shadow: 0 12px 30px rgba(255, 215, 0, 0.2); 
    }

    .avatar-ring { 
      position: absolute; 
      top: -4px; 
      left: -4px; 
      right: -4px; 
      bottom: -4px; 
      border-radius: 50%; 
      border: 2px solid rgba(255, 215, 0, 0); 
      transition: all 0.3s ease; 
      pointer-events: none; 
    }

    .officer-card:hover .avatar-ring { 
      border-color: #ffd700; 
      top: -8px; 
      left: -8px; 
      right: -8px; 
      bottom: -8px; 
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.15); 
    }

    .hover-dot { 
      position: absolute; 
      bottom: -4px; 
      right: -4px; 
      width: 0; 
      height: 0; 
      background: #ffd700; 
      border-radius: 50%; 
      transition: all 0.3s ease; 
      pointer-events: none; 
    }

    .officer-card:hover .hover-dot { 
      width: 8px; 
      height: 8px; 
      bottom: -5px; 
      right: -5px; 
    }

    .officer-info {
      text-align: center;
      margin-top: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .officer-info h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: white;
      transition: color 0.3s;
      min-height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .officer-card:hover .officer-info h3 { 
      color: #ffd700; 
    }

    .officer-info .role {
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 1px;
      min-height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .officer-info .bio {
      font-size: 0.55rem;
      opacity: 0.7;
      margin-top: 4px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      line-height: 1.3;
    }

    .officer-card::before { 
      content: ""; 
      position: absolute; 
      bottom: -6px; 
      left: 10%; 
      width: 80%; 
      height: 10px; 
      background: rgba(0, 0, 0, 0.3); 
      filter: blur(8px); 
      border-radius: 50%; 
      transition: all 0.3s ease; 
      opacity: 0.3; 
    }

    .officer-card:hover::before { 
      bottom: -12px; 
      filter: blur(10px); 
      opacity: 0.6; 
    }

    /* GALLERY */
    .gallery {
      padding: 50px 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 50%, #1a1a2e 100%);
      position: relative;
      overflow: hidden;
    }

    .gallery::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.03"/></svg>');
      background-repeat: repeat;
      pointer-events: none;
      z-index: 0;
    }

    /* REDUCED STARS */
    .stars-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: radial-gradient(circle, rgba(255,215,0,0.3), rgba(255,215,0,0.02));
      border-radius: 50%;
      animation: twinkle 4s ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.4; transform: scale(1.2); }
    }

    .gallery-header { 
      text-align: center; 
      margin-bottom: 30px; 
      position: relative; 
      z-index: 2; 
      padding: 0 12px;
    }

    .gallery-header h2 { 
      font-size: 1.5rem; 
      color: white; 
      margin-bottom: 6px; 
      font-family: "Playfair Display", serif; 
      letter-spacing: 2px; 
    }

    .gallery-header h2 span { 
      color: #ffd700; 
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.15); 
    }

    .gallery-header p { 
      color: rgba(255, 255, 255, 0.35); 
      font-family: monospace; 
      letter-spacing: 1px; 
      font-size: 0.55rem; 
    }

    .cinema-lights {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }

    .cinema-lights span {
      width: 4px;
      height: 4px;
      background: #ffd700;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
    }

    .cinema-lights span:nth-child(2) { animation-delay: 0.3s; }
    .cinema-lights span:nth-child(3) { animation-delay: 0.6s; }
    .cinema-lights span:nth-child(4) { animation-delay: 0.9s; }
    .cinema-lights span:nth-child(5) { animation-delay: 1.2s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 30px;
      transition: opacity 0.25s ease;
      position: relative;
      z-index: 2;
      padding: 0 12px;
    }

    .photo-card {
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
      border-radius: 6px;
      -webkit-tap-highlight-color: transparent;
    }

    .photo-card:active {
      transform: scale(0.95);
    }

    .photo-card:hover {
      transform: scale(1.02);
      z-index: 5;
    }

    .photo-image {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 6px;
      background: #1a1a2e;
    }

    .photo-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: all 0.4s ease;
      will-change: transform;
    }

    .photo-image img.loaded { 
      opacity: 1;
    }

    .photo-image img.error {
      object-fit: contain;
      padding: 10px;
      opacity: 0.5;
    }

    .photo-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.3) 100%);
      opacity: 0.5;
      pointer-events: none;
      transition: opacity 0.3s ease;
      border-radius: 6px;
    }

    .photo-card:hover .photo-image::after { opacity: 0.7; }

    .photo-image .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 2;
      border-radius: 6px;
    }

    .photo-card:hover .photo-image .overlay { opacity: 1; }

    .overlay-icon {
      font-size: 24px;
      color: #ffd700;
      transform: scale(0.8);
      transition: transform 0.3s ease;
      filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.2));
    }

    .photo-card:hover .overlay-icon { transform: scale(1); }

    .cinematic-caption {
      text-align: center;
      margin-top: 4px;
      font-family: monospace;
    }

    .cinematic-caption .scene-number { 
      font-size: 0.45rem; 
      color: #ffd700; 
      letter-spacing: 1px; 
    }

    .cinematic-caption .caption-text { 
      font-size: 0.45rem; 
      color: rgba(255, 255, 255, 0.5); 
      margin-top: 2px; 
      font-weight: 300; 
    }

    /* PAGINATION */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      position: relative;
      z-index: 2;
      padding: 0 12px;
    }

    .page-btn {
      background: transparent;
      border: 1.5px solid #ffb83b;
      color: #ffb83b;
      padding: 6px 16px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.3s;
      min-width: 70px;
      -webkit-tap-highlight-color: transparent;
    }

    .page-btn:hover:not(:disabled) {
      background: #ffb83b;
      color: #000;
      transform: translateY(-2px);
      box-shadow: 0 3px 12px rgba(255, 184, 59, 0.2);
    }

    .page-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .page-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .page-dot.active {
      background: #ffb83b;
      transform: scale(1.3);
      box-shadow: 0 0 8px rgba(255, 184, 59, 0.3);
    }

    .page-dot:hover:not(.active) {
      background: rgba(255, 184, 59, 0.3);
      transform: scale(1.1);
    }

    .gallery-grid.page-leaving { 
      opacity: 0; 
      transform: scale(0.98); 
      pointer-events: none; 
    }
    .gallery-grid.page-entering { 
      opacity: 0; 
      transform: scale(0.99); 
    }
    .gallery-grid.page-visible { 
      opacity: 1; 
      transform: scale(1); 
    }

    /* FOOTER */
    .footer { 
      text-align: center; 
      padding: 20px; 
      background: #050505; 
      border-top: 1px solid rgba(255, 215, 0, 0.05); 
    }

    .footer p {
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.15);
    }

    /* SCROLL TOP */
    .scroll-top {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #ffb83b;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      z-index: 999;
      box-shadow: 0 0 10px rgba(255, 184, 59, 0.2);
      -webkit-tap-highlight-color: transparent;
    }

    .scroll-top.active { 
      opacity: 1; 
      visibility: visible; 
    }

    .scroll-top:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 4px 15px rgba(255, 184, 59, 0.3); 
    }

    .scroll-top:active {
      transform: scale(0.9);
    }

    /* SWIPE HINT - REMOVED */
    .swipe-hint {
      display: none;
    }

    /* RESPONSIVE */
    @media (min-width: 1200px) { 
      .gallery-grid { 
        grid-template-columns: repeat(4, 1fr); 
        gap: 12px; 
      } 
    }

    @media (max-width: 1199px) and (min-width: 768px) { 
      .gallery-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 12px; 
      } 
      .officers-grid { 
        grid-template-columns: repeat(2, 1fr); 
        gap: 20px;
      }
    }

    @media (max-width: 767px) {
      .officers-grid { 
        grid-template-columns: repeat(2, 1fr); 
        gap: 14px;
        padding: 0 10px;
      }
      
      .avatar-frame { 
        width: 80px; 
        height: 80px; 
        margin: -30px auto 8px; 
      }
      
      .officer-info h3 {
        font-size: 0.7rem;
        min-height: 20px;

      .officer-info .role {

        min-height: 16px;
      }
      
      .officer-info .bio {

      .card-inner {

      .gallery-grid {

      .gallery-header h2 {

      }
      
      .section-title h2 {

      .photo-image .overlay-icon {

      .cinematic-caption .scene-number {

      .cinematic-caption .caption-text {

      .page-btn {

      .page-dot {

      }
      
      .pagination {
        gap: 8px;
      }
      
      .navbar .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(8, 8, 12, 0.98);
        flex-direction: column;
        padding: 12px 16px;
        gap: 6px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      }

      .navbar .nav-links.active {
        display: flex;
      }

      .navbar .mobile-btn {
        display: block;
      }
      
      .navbar .logo h1 {
        font-size: 0.8rem;
      }
      
      .navbar .logo img {
        width: 22px;

      }
      
      .youth-officers-section { 
        padding: 80px 0 40px; 
        background-attachment: scroll;
      }
      
      .youth-officers-section::before {
        background-attachment: scroll;
      }
      
      .loading-logo {
        width: 50px;
        height: 50px;
      }
      
      .loading-text {
        font-size: 0.85rem;
      }

      .scroll-top {

        font-size: 0.6rem;
      }
      
      .cinema-lights {
        gap: 4px;
      }
      
      .cinema-lights span {
        width: 3px;
        height: 3px;
      }
    }

    @media (max-width: 480px) {
      .officers-grid { 
        grid-template-columns: repeat(2, 1fr); 
        gap: 10px;
        padding: 0 8px;
      }
      
      .avatar-frame { 
        width: 65px; 
        height: 65px; 
        margin: -22px auto 6px; 
      }
      
      .officer-info h3 {
        font-size: 0.6rem;
        min-height: 18px;
      }
      
      .officer-info .role {
        font-size: 0.45rem;
        min-height: 14px;
      }
      
      .officer-info .bio {
        font-size: 0.45rem;
        min-height: 22px;
      }
      
      .card-inner {
        padding: 10px 6px 8px;
        border-radius: 12px;
      }

      .gallery-grid { 
        grid-template-columns: 1fr 1fr; 
        gap: 6px; 
        padding: 0 8px;
      }
      
      .gallery-header h2 { 
        font-size: 1rem; 
      }
      
      .section-title h2 { 
        font-size: 1.2rem; 
      }
      
      .page-btn { 
        padding: 4px 8px; 
        min-width: 50px; 
        font-size: 0.55rem; 
      }
    }

    @media (max-width: 767px) and (orientation: landscape) {
      .gallery-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 8px; 
      }
      
      .officers-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 10px;
      }
      
      .avatar-frame { 
        width: 60px; 
        height: 60px; 
        margin: -20px auto 6px; 
      }
      
      .youth-officers-section { 
        padding: 70px 0 30px; 
      }
    }
  </style>
</head>

<body>

  <!-- LOADING SCREEN -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-content">
      <div class="loading-logo">
        <img src="img/logo.png" alt="Logo" onerror="this.style.display='none'">
      </div>
      <div class="loading-text">Youth Ministry</div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content" id="mainContent">

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
      <div class="container">
        <a href="index.html" class="logo">
          <img src="img/logo.png" alt="Logo" onerror="this.style.display='none'">
          <h1>Youth Ministry</h1>
        </a>
        <button class="mobile-btn" id="mobileBtn">
          <i class="bi bi-list"></i>
        </button>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </div>
    </nav>

    <main>

      <!-- YOUTH OFFICERS -->
      <section class="youth-officers-section">
        <div class="container">
          <div class="section-title">
            <h2><span>YOUTH OFFICERS</span></h2>
            <p>2024-2026</p>
            <p>Meet our dedicated team of Youth Leaders!</p>
          </div>
          <div class="officers-grid" id="officersGrid"></div>
        </div>
      </section>

      <!-- CINEMATIC GALLERY -->
      <section class="gallery">
        <div class="stars-container" id="starsContainer"></div>
        
        <div class="container">
          <div class="gallery-header">
            <h2>✦ <span>CINEMATIC</span> MOMENTS ✦</h2>
            <p id="photoCountDisplay">Loading gallery...</p>
          </div>
          <div class="cinema-lights">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="gallery-grid" id="galleryGrid"></div>
          <div class="pagination">
            <button class="page-btn" id="prevBtn">← Prev</button>
            <div class="page-indicator" id="pageIndicator"></div>
            <button class="page-btn" id="nextBtn">Next →</button>
          </div>
        </div>
      </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="container">
        <p>© 2026 Youth Ministry — Living Testimonies</p>
      </div>
    </footer>

    <!-- SCROLL TOP -->
    <a href="#" class="scroll-top" id="scrollTop"><i class="bi bi-arrow-up"></i></a>

  </div>

  <!-- CUSTOM LIGHTBOX - NO SWIPE -->
  <div class="lightbox-overlay" id="lightboxOverlay">
    <button class="lightbox-close" id="lightboxClose">
      <i class="bi bi-x-lg"></i>
    </button>
    <div class="lightbox-content">
      <img id="lightboxImage" src="" alt="Full view">
      <div class="lightbox-caption" id="lightboxCaption">
        <span class="title">SCENE</span> <span id="lightboxScene">001</span> — <span id="lightboxDesc">A Moment of Worship</span>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // LOADING SCREEN - HIDE IMMEDIATELY
    // ============================================
    const loadingScreen = document.getElementById('loadingScreen');
    const mainContent = document.getElementById('mainContent');

    loadingScreen.classList.add('hide');
    mainContent.classList.add('show');

    // ============================================
    // STARS - REDUCED
    // ============================================
    function initStars() {
      const container = document.getElementById('starsContainer');
      if (!container) return;
      
      container.innerHTML = '';
      
      const isMobile = window.innerWidth < 768;
      const starCount = isMobile ? 15 : 30;
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = Math.random() * 1.5 + 0.5 + 'px';
        star.style.height = star.style.width;
        star.style.animationDelay = Math.random() * 6 + 's';
        star.style.animationDuration = Math.random() * 4 + 3 + 's';
        container.appendChild(star);
      }
    }

    initStars();

    // ============================================
    // SETTINGS
    // ============================================
    const isMobileDevice = window.innerWidth < 768;
    const PHOTOS_PER_PAGE = isMobileDevice ? 8 : 15;
    const TOTAL_GALLERY_PHOTOS = 120;
    
    const CAPTIONS = [
      "A Moment of Worship 🙏", "A Moment of Fellowship 🤝", "A Moment of Joy 😊",
      "A Moment of Praise 🎵", "A Moment of Prayer 🕯️", "A Moment of Unity 💙",
      "A Moment of Service ❤️", "A Moment of Celebration 🎉", "A Moment of Reflection 🧘",
      "A Moment of Friendship 👭", "A Moment of Growth 🌱", "A Moment of Gratitude 🙌",
      "A Moment of Adventure ⛰️", "A Moment of Peace ✨", "A Moment of Hope 🌟",
      "A Moment of Faith ✝️", "A Moment of Love 💕", "A Moment of Strength 💪",
      "A Moment of Kindness 🤗", "A Moment of Laughter 😂", "A Moment of Courage 🦁",
      "A Moment of Mercy 💝", "A Moment of Grace 🕊️", "A Moment of Victory 🏆"
    ];

    const YOUTH_OFFICERS = [
      { 
        imageNumber: 812, 
        name: "Nickxon Vivero", 
        role: "Former Youth President", 
        bio: "Philippians 4:13 - I can do all things through Christ who strengthens me", 
        focus: { focusX: 50, focusY: 5 } 
      },
      { 
        imageNumber: 922, 
        name: "Sit Ador", 
        role: "Former Youth Vice President", 
        bio: "Psalm 23:4 - Yea, though I walk through the valley of the shadow of death, I will fear no evil: for thou art with me; thy rod and thy staff they comfort me.", 
        focus: { focusX: 50, focusY: 5 } 
      },
      { 
        imageNumber: 933, 
        name: "Joyce Ann Saballa", 
        role: "Former Youth Secretary", 
        bio: "Colossians 3:17 - And whatever you do in word or deed, do all in the name of the Lord Jesus, giving thanks to God the Father through Him.", 
        focus: { focusX: 48, focusY: 5 } 
      },
      { 
        imageNumber: 944, 
        name: "Julie Anne Tabelog", 
        role: "Former Youth Treasurer", 
        bio: "Colossians 3:23 - And whatsoever ye do, do it heartily, as to the Lord, and not unto men", 
        focus: { focusX: 50, focusY: 5 } 
      }
    ];

    let currentPageImages = [];
    let currentPageStart = 1;
    let currentPageEnd = 30;

    const TOTAL_PAGES = Math.ceil(TOTAL_GALLERY_PHOTOS / PHOTOS_PER_PAGE);
    let currentPage = 1, isLoading = false;

    function updatePhotoCountDisplay() {
      const display = document.getElementById('photoCountDisplay');
      if (display) {
        display.innerHTML = `${TOTAL_GALLERY_PHOTOS} scenes | Page ${currentPage} of ${TOTAL_PAGES}`;
      }
    }

    function getCaption(n) { return CAPTIONS[(n - 1) % CAPTIONS.length]; }
    
    function getPageRange() { 
      const s = (currentPage - 1) * PHOTOS_PER_PAGE + 1; 
      return { start: s, end: Math.min(s + PHOTOS_PER_PAGE - 1, TOTAL_GALLERY_PHOTOS) }; 
    }
    
    function updatePageIndicator() {
      const ind = document.getElementById('pageIndicator'); 
      if (!ind) return;
      ind.innerHTML = '';
      const maxDots = isMobileDevice ? Math.min(TOTAL_PAGES, 5) : TOTAL_PAGES;
      const startDot = isMobileDevice ? Math.max(1, currentPage - 2) : 1;
      const endDot = isMobileDevice ? Math.min(TOTAL_PAGES, startDot + 4) : TOTAL_PAGES;
      
      for (let i = startDot; i <= endDot; i++) {
        const d = document.createElement('div'); 
        d.className = 'page-dot' + (i === currentPage ? ' active' : '');
        d.addEventListener('click', () => {
          if (i !== currentPage && !isLoading) {
            currentPage = i;
            loadPage();
          }
        });
        ind.appendChild(d);
      }
    }

    // ============================================
    // IMAGE PATH - .jpg FIRST
    // ============================================
    function getImagePath(n) {
      return `img/gallery/${n}`;
    }

    // ============================================
    // LIGHTBOX FUNCTIONS - SIMPLE, NO SWIPE
    // ============================================
    const lightboxOverlay = document.getElementById('lightboxOverlay');
    const lightboxImage = document.getElementById('lightboxImage');
    const lightboxScene = document.getElementById('lightboxScene');
    const lightboxDesc = document.getElementById('lightboxDesc');
    const lightboxClose = document.getElementById('lightboxClose');

    function openLightbox(n) {
      const caption = getCaption(n);
      const sceneNum = String(n).padStart(3, '0');
      const imgPath = getImagePath(n);
      
      // Try .jpg first, then .jpeg
      const extensions = ['.jpg', '.jpeg'];
      let extIndex = 0;
      
      function tryNextExtension() {
        if (extIndex < extensions.length) {
          lightboxImage.src = imgPath + extensions[extIndex];
          extIndex++;
        } else {
          lightboxImage.src = `https://picsum.photos/seed/${n}/800/600`;
        }
      }
      
      lightboxImage.onerror = function() {
        this.onerror = null;
        tryNextExtension();
        if (extIndex >= extensions.length) {
          this.onerror = function() {
            this.onerror = null;
            this.src = `https://picsum.photos/seed/${n}/800/600`;
          };
        }
      };
      
      tryNextExtension();
      
      lightboxScene.textContent = sceneNum;
      lightboxDesc.textContent = caption;
      
      lightboxOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightboxOverlay.classList.remove('active');
      document.body.style.overflow = '';
      // Clear image to prevent flash
      setTimeout(() => {
        lightboxImage.src = '';
      }, 300);
    }

    lightboxClose.addEventListener('click', closeLightbox);

    lightboxOverlay.addEventListener('click', function(e) {
      if (e.target === lightboxOverlay) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeLightbox();
      }
    });

    // ============================================
    // CREATE PHOTO CARD - WITH CLICK
    // ============================================
    async function createPhotoCard(n) {
      const card = document.createElement('div'); 
      card.className = 'photo-card';
      
      const imgDiv = document.createElement('div'); 
      imgDiv.className = 'photo-image';
      const img = document.createElement('img'); 
      img.alt = `Photo ${n}`;
      img.loading = 'lazy';
      img.decoding = 'async';
      img.width = 400;
      img.height = 225;
      
      const overlay = document.createElement('div'); 
      overlay.className = 'overlay'; 
      overlay.innerHTML = '<i class="bi bi-play-circle overlay-icon"></i>';
      
      const extensions = ['.jpg', '.jpeg'];
      let extIndex = 0;
      
      function tryNext() {
        if (extIndex < extensions.length) {
          img.src = getImagePath(n) + extensions[extIndex];
          extIndex++;
        } else {
          img.src = `https://picsum.photos/seed/${n}/400/225`;
          img.classList.add('error');
        }
      }
      
      img.onerror = function() {
        this.onerror = null;
        tryNext();
        if (extIndex >= extensions.length) {
          this.onerror = function() {
            this.onerror = null;
            this.src = `https://picsum.photos/seed/${n}/400/225`;
            this.classList.add('error');
          };
        }
      };
      
      img.onload = () => { 
        requestAnimationFrame(() => { 
          requestAnimationFrame(() => img.classList.add('loaded')); 
        }); 
      };
      
      tryNext();
      
      imgDiv.appendChild(img); 
      imgDiv.appendChild(overlay);
      
      const captionDiv = document.createElement('div'); 
      captionDiv.className = 'cinematic-caption';
      captionDiv.innerHTML = `<div class="scene-number">🎬 SCENE ${String(n).padStart(3, '0')}</div><div class="caption-text">${getCaption(n)}</div>`;
      card.appendChild(imgDiv); 
      card.appendChild(captionDiv);
      
      // Click to open lightbox
      card.addEventListener('click', function(e) {
        e.preventDefault();
        openLightbox(n);
      });
      
      return card;
    }

    // ============================================
    // CREATE OFFICER CARD
    // ============================================
    async function createOfficerCard(o) {
      const card = document.createElement('div'); 
      card.className = 'officer-card';
      const inner = document.createElement('div'); 
      inner.className = 'card-inner';
      const frame = document.createElement('div'); 
      frame.className = 'avatar-frame';
      const avatar = document.createElement('div'); 
      avatar.className = 'avatar';
      const img = document.createElement('img');
      
      const extensions = ['.jpg', '.jpeg'];
      let extIndex = 0;
      
      img.alt = o.name;
      img.loading = 'lazy';
      img.decoding = 'async';
      img.width = 200;
      img.height = 200;
      img.style.objectPosition = `${o.focus?.focusX ?? 50}% ${o.focus?.focusY ?? 50}%`;
      img.style.objectFit = 'cover';
      
      function tryNext() {
        if (extIndex < extensions.length) {
          img.src = getImagePath(o.imageNumber) + extensions[extIndex];
          extIndex++;
        } else {
          img.src = `https://picsum.photos/seed/${o.imageNumber}/200/200`;
        }
      }
      
      img.onerror = function() {
        this.onerror = null;
        tryNext();
        if (extIndex >= extensions.length) {
          this.onerror = function() {
            this.onerror = null;
            this.src = `https://picsum.photos/seed/${o.imageNumber}/200/200`;
          };
        }
      };
      
      tryNext();
      
      const ring = document.createElement('div'); 
      ring.className = 'avatar-ring';
      const dot = document.createElement('div'); 
      dot.className = 'hover-dot';
      avatar.appendChild(img); 
      avatar.appendChild(ring); 
      avatar.appendChild(dot);
      frame.appendChild(avatar);
      const info = document.createElement('div'); 
      info.className = 'officer-info';
      info.innerHTML = `<h3>${o.name}</h3><div class="role">${o.role}</div><div class="bio">${o.bio}</div>`;
      inner.appendChild(frame); 
      inner.appendChild(info); 
      card.appendChild(inner);
      return card;
    }

    // ============================================
    // LOAD PAGE
    // ============================================
    async function loadPage() {
      if (isLoading) return; 
      isLoading = true;
      const prev = document.getElementById('prevBtn'), next = document.getElementById('nextBtn'), grid = document.getElementById('galleryGrid');
      prev.disabled = true; 
      next.disabled = true;
      grid.classList.remove('page-visible', 'page-entering'); 
      grid.classList.add('page-leaving');
      await new Promise(r => setTimeout(r, 200));
      const { start, end } = getPageRange(); 
      const cards = [];
      currentPageImages = [];
      
      for (let i = start; i <= end; i++) {
        cards.push(await createPhotoCard(i));
        currentPageImages.push(getImagePath(i) + '.jpg');
      }
      currentPageStart = start;
      currentPageEnd = end;
      
      grid.innerHTML = ''; 
      cards.forEach(c => grid.appendChild(c));
      grid.classList.remove('page-leaving'); 
      grid.classList.add('page-entering');
      requestAnimationFrame(() => { 
        requestAnimationFrame(() => { 
          grid.classList.remove('page-entering'); 
          grid.classList.add('page-visible'); 
        }); 
      });
      prev.disabled = currentPage === 1; 
      next.disabled = currentPage === TOTAL_PAGES;
      updatePageIndicator(); 
      updatePhotoCountDisplay();
      isLoading = false;
    }

    // ============================================
    // LOAD OFFICERS
    // ============================================
    async function loadOfficers() { 
      const grid = document.getElementById('officersGrid'); 
      if (!grid) return; 
      grid.innerHTML = ''; 
      for (const o of YOUTH_OFFICERS) grid.appendChild(await createOfficerCard(o)); 
    }
    
    // ============================================
    // PAGE NAVIGATION
    // ============================================
    function nextPage() { 
      if (currentPage < TOTAL_PAGES && !isLoading) { 
        currentPage++; 
        loadPage(); 
        const grid = document.getElementById('galleryGrid');
        if (grid) {
          const rect = grid.getBoundingClientRect();
          const offset = window.innerWidth < 768 ? 50 : 70;
          window.scrollTo({ top: window.scrollY + rect.top - offset, behavior: 'smooth' });
        }
      } 
    }
    
    function prevPage() { 
      if (currentPage > 1 && !isLoading) { 
        currentPage--; 
        loadPage(); 
        const grid = document.getElementById('galleryGrid');
        if (grid) {
          const rect = grid.getBoundingClientRect();
          const offset = window.innerWidth < 768 ? 50 : 70;
          window.scrollTo({ top: window.scrollY + rect.top - offset, behavior: 'smooth' });
        }
      } 
    }
    
    // ============================================
    // EVENT LISTENERS
    // ============================================
    function initMobileMenu() { 
      const btn = document.getElementById('mobileBtn'), menu = document.getElementById('navLinks'); 
      if (btn && menu) { 
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          menu.classList.toggle('active');
        }); 
        menu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => menu.classList.remove('active'))); 
        document.addEventListener('click', (e) => {
          if (!menu.contains(e.target) && e.target !== btn) {
            menu.classList.remove('active');
          }
        });
      } 
    }
    
    function initScrollTop() { 
      const st = document.getElementById('scrollTop'); 
      if (!st) return; 
      window.addEventListener('scroll', () => st.classList.toggle('active', window.scrollY > 300), { passive: true }); 
      st.addEventListener('click', e => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }); 
    }

    function initNavbarScroll() {
      const navbar = document.getElementById('navbar');
      window.addEventListener('scroll', function() {
        if (window.scrollY > 40) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      }, { passive: true });
    }
    
    function initEventListeners() {
      document.getElementById('prevBtn').addEventListener('click', prevPage); 
      document.getElementById('nextBtn').addEventListener('click', nextPage);
      
      // Touch swipe for pagination only
      let touchStartX = 0;
      let touchEndX = 0;
      document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
      }, { passive: true });
      
      document.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        const diff = touchStartX - touchEndX;
        if (Math.abs(diff) > 40) {
          if (diff > 0) {
            nextPage();
          } else {
            prevPage();
          }
        }
      }, { passive: true });
      
      // Keyboard for pagination
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') {
          if (!isLoading) nextPage();
        } else if (e.key === 'ArrowLeft') {
          if (!isLoading) prevPage();
        }
      });
      
      loadOfficers();
      loadPage();
      updatePageIndicator();
      updatePhotoCountDisplay();
      
      initMobileMenu(); 
      initScrollTop();
      initNavbarScroll(); 
    }

    // Handle resize
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        const newIsMobile = window.innerWidth < 768;
        if (newIsMobile !== (PHOTOS_PER_PAGE === 8)) {
          location.reload();
        }
      }, 500);
    }, { passive: true });

    initEventListeners();
  </script>
</body>
