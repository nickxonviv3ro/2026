<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
  <title>Living Testimonies - Youth Ministry | Cinematic Gallery</title>
  <meta name="description" content="Youth Ministry Portfolio - Cinematic Style" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/glightbox@3.2.0/dist/css/glightbox.min.css" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: "Inter", sans-serif;
      color: rgba(255, 255, 255, 0.85);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* GLIGHTBOX OVERRIDES */
    .glightbox-container {
      z-index: 99999 !important;
    }
    
    .glightbox-container .gslide-description {
      background: rgba(0,0,0,0.8) !important;
      backdrop-filter: blur(10px) !important;
      padding: 15px 20px !important;
      border-radius: 12px !important;
      max-width: 90% !important;
      margin: 0 auto !important;
      position: relative !important;
      bottom: 20px !important;
    }
    
    .glightbox-container .gslide-description .gslide-title {
      color: #ffd700 !important;
      font-size: 1rem !important;
      font-weight: 600 !important;
    }
    
    .glightbox-container .gslide-description .gslide-desc {
      color: rgba(255,255,255,0.8) !important;
      font-size: 0.85rem !important;
    }
    
    .glightbox-container .gclose,
    .glightbox-container .gnext,
    .glightbox-container .gprev {
      background: rgba(0,0,0,0.6) !important;
      backdrop-filter: blur(10px) !important;
      border-radius: 50% !important;
      width: 45px !important;
      height: 45px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      transition: all 0.3s ease !important;
    }
    
    .glightbox-container .gclose:hover,
    .glightbox-container .gnext:hover,
    .glightbox-container .gprev:hover {
      background: #ffd700 !important;
      color: #000 !important;
      transform: scale(1.1) !important;
    }
    
    .glightbox-container .gclose {
      top: 20px !important;
      right: 20px !important;
    }
    
    .glightbox-container .gnext {
      right: 20px !important;
    }
    
    .glightbox-container .gprev {
      left: 20px !important;
    }
    
    .glightbox-container .gslide-image img {
      max-height: 80vh !important;
      object-fit: contain !important;
      border-radius: 8px !important;
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-content {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .loading-logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      animation: floatGlow 2.4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
    }

    .loading-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
    }

    @keyframes floatGlow {
      0% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); }
      50% { transform: translateY(-10px) scale(1.04); filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.7)); }
      100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); }
    }

    .loading-text {
      font-size: 1.4rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 4px;
      margin-bottom: 28px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
      font-family: "Playfair Display", serif;
    }

    .progress-container {
      width: 220px;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
      margin: 0 auto;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #f5a623, #ffd700);
      background-size: 200% 100%;
      animation: shimmerProgress 1.8s infinite;
      transition: width 0.25s ease;
      border-radius: 4px;
    }

    @keyframes shimmerProgress {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .loading-percent {
      font-size: 0.8rem;
      color: rgba(255, 215, 0, 0.7);
      margin-top: 16px;
      font-family: monospace;
      letter-spacing: 2px;
      font-weight: 300;
    }

    .loading-screen.hide {
      opacity: 0;
      visibility: hidden;
    }

    .main-content {
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .main-content.show {
      opacity: 1;
    }

    :root {
      --cinema-color: #ffd700;
      --gold: #f5c542;
      --gold-dim: rgba(245, 197, 66, 0.12);
      --gold-hover: rgba(245, 197, 66, 0.25);
      --gold-glow: rgba(245, 197, 66, 0.25);
      --bg-body: #08080c;
      --bg-card: #111118;
      --bg-card-hover: #191925;
      --border-light: rgba(255, 255, 255, 0.04);
      --text-white: #f0f0f2;
      --text-gray: #a0a0aa;
      --text-dim: #606070;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 18px 0;
      background: transparent;
      transition: all 0.3s ease;
    }

    .navbar.scrolled {
      padding: 12px 0;
      background: rgba(8, 8, 12, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .navbar .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .navbar .logo img {
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    .navbar .logo h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-white);
      margin: 0;
      letter-spacing: -0.3px;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    .navbar .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
      margin: 0;
    }

    .navbar .nav-links a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.85rem;
      transition: color 0.3s;
      position: relative;
      padding: 4px 0;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .navbar .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--gold);
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    .navbar .nav-links a:hover::after,
    .navbar .nav-links a.active::after {
      width: 100%;
    }

    .navbar .nav-links a:hover,
    .navbar .nav-links a.active {
      color: var(--text-white);
    }

    .navbar .mobile-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-white);
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .youth-officers-section { 
      padding: 140px 0 100px; 
      position: relative; 
      overflow: hidden;
      isolation: isolate;
    }

    .youth-officers-section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("img/Background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      transform: translateZ(0);
      will-change: transform;
      z-index: -2;
    }

    .youth-officers-section::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .youth-officers-section .container { 
      position: relative; 
      z-index: 1; 
    }

    .section-title { 
      text-align: center; 
      margin-bottom: 60px; 
    }

    .section-title h2 { 
      font-size: 2.5rem; 
      font-weight: 800; 
      color: white; 
      letter-spacing: 2px; 
    }

    .section-title h2 span { 
      color: var(--cinema-color); 
      position: relative; 
      display: inline-block; 
    }

    .section-title h2 span::after { 
      content: ""; 
      position: absolute; 
      bottom: -10px; 
      left: 0; 
      right: 0; 
      height: 3px; 
      background: linear-gradient(90deg, transparent, var(--cinema-color), transparent); 
    }

    .section-title p { 
      color: rgba(255, 255, 255, 0.8); 
      margin-top: 15px; 
    }

    /* ============================================ */
    /* OFFICERS GRID - FIXED FOR 2 PER ROW ON MOBILE */
    /* ============================================ */
    .officers-grid { 
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px;
      max-width: 1300px; 
      margin: 0 auto; 
      position: relative; 
      z-index: 2; 
      padding: 0 20px;
    }

    .officer-card {
      position: relative;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .card-inner {
      position: relative;
      background: rgba(20, 20, 30, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 30px 20px 25px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .officer-card:hover .card-inner { 
      transform: translateY(-10px); 
      background: rgba(30, 30, 45, 0.9); 
      border-color: rgba(255, 215, 0, 0.5); 
    }

    .avatar-frame { 
      position: relative; 
      width: 150px; 
      height: 150px; 
      margin: -50px auto 15px; 
      z-index: 10; 
      border-radius: 50%; 
      overflow: hidden; 
    }

    .avatar { 
      position: relative; 
      width: 100%; 
      height: 100%; 
      border-radius: 50%; 
      overflow: visible; 
    }

    .avatar img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      border-radius: 50%; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
      transition: all 0.4s ease; 
    }

    .officer-card:hover .avatar img { 
      transform: scale(1.08); 
      box-shadow: 0 20px 40px rgba(255, 215, 0, 0.3); 
    }

    .avatar-ring { 
      position: absolute; 
      top: -8px; 
      left: -8px; 
      right: -8px; 
      bottom: -8px; 
      border-radius: 50%; 
      border: 2px solid rgba(255, 215, 0, 0); 
      transition: all 0.4s ease; 
      pointer-events: none; 
    }

    .officer-card:hover .avatar-ring { 
      border-color: #ffd700; 
      top: -15px; 
      left: -15px; 
      right: -15px; 
      bottom: -15px; 
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); 
    }

    .hover-dot { 
      position: absolute; 
      bottom: -5px; 
      right: -5px; 
      width: 0; 
      height: 0; 
      background: #ffd700; 
      border-radius: 50%; 
      transition: all 0.3s ease; 
      pointer-events: none; 
    }

    .officer-card:hover .hover-dot { 
      width: 12px; 
      height: 12px; 
      bottom: -8px; 
      right: -8px; 
    }

    .officer-info {
      text-align: center;
      margin-top: 15px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .officer-info h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      transition: color 0.3s;
      min-height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .officer-card:hover .officer-info h3 { 
      color: #ffd700; 
    }

    .officer-info .role {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1px;
      min-height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .officer-info .bio {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 8px;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      line-height: 1.4;
    }

    .officer-card::before { 
      content: ""; 
      position: absolute; 
      bottom: -10px; 
      left: 10%; 
      width: 80%; 
      height: 15px; 
      background: rgba(0, 0, 0, 0.3); 
      filter: blur(10px); 
      border-radius: 50%; 
      transition: all 0.4s ease; 
      opacity: 0.5; 
    }

    .officer-card:hover::before { 
      bottom: -20px; 
      filter: blur(15px); 
      opacity: 0.8; 
    }

    /* ============================================ */
    /* GALLERY */
    /* ============================================ */
    .gallery {
      padding: 80px 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 50%, #1a1a2e 100%);
      position: relative;
      overflow: hidden;
    }

    .gallery::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.04"/></svg>');
      background-repeat: repeat;
      pointer-events: none;
      z-index: 0;
    }

    .stars-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: radial-gradient(circle, rgba(255,215,0,0.8), rgba(255,215,0,0.1));
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.8; transform: scale(1.2); }
    }

    .shooting-star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: linear-gradient(90deg, #ffd700, transparent);
      border-radius: 50%;
      animation: shoot 4s linear infinite;
      opacity: 0;
    }

    @keyframes shoot {
      0% { opacity: 0; transform: translateX(0) translateY(0); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-200px) translateY(200px); }
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ffd700;
      border-radius: 50%;
      animation: sparkle 2s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(255,215,0,0.8);
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    .gallery-header { 
      text-align: center; 
      margin-bottom: 40px; 
      position: relative; 
      z-index: 2; 
      padding: 0 15px;
    }

    .gallery-header h2 { 
      font-size: 2rem; 
      color: white; 
      margin-bottom: 10px; 
      font-family: "Playfair Display", serif; 
      letter-spacing: 2px; 
    }

    .gallery-header h2 span { 
      color: #ffd700; 
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); 
    }

    .gallery-header p { 
      color: rgba(255, 255, 255, 0.5); 
      font-family: monospace; 
      letter-spacing: 1px; 
      font-size: 0.7rem; 
    }

    .cinema-lights {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      position: relative;
      z-index: 2;
    }

    .cinema-lights span {
      width: 6px;
      height: 6px;
      background: #ffd700;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .cinema-lights span:nth-child(2) { animation-delay: 0.3s; }
    .cinema-lights span:nth-child(3) { animation-delay: 0.6s; }
    .cinema-lights span:nth-child(4) { animation-delay: 0.9s; }
    .cinema-lights span:nth-child(5) { animation-delay: 1.2s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
      margin-bottom: 40px;
      transition: opacity 0.25s ease, transform 0.25s ease;
      position: relative;
      z-index: 2;
      padding: 0 15px;
    }

    .photo-card {
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
      border-radius: 10px;
      -webkit-tap-highlight-color: transparent;
    }

    .photo-card:active {
      transform: scale(0.96);
    }

    .photo-image {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 10px;
      background: #1a1a2e;
    }

    .photo-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: blur(8px) brightness(0.8);
      transform: scale(1.05);
      transition: all 0.5s ease;
    }

    .photo-image img.loaded { 
      filter: blur(0px) brightness(1); 
      transform: scale(1); 
    }

    .photo-image img.error {
      object-fit: contain;
      padding: 20px;
      filter: blur(0px) brightness(0.5);
    }

    .photo-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
      opacity: 0.6;
      pointer-events: none;
      transition: opacity 0.3s ease;
      border-radius: 10px;
    }

    .photo-card:hover .photo-image::after { opacity: 0.9; }

    .photo-image .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 2;
      border-radius: 10px;
    }

    .photo-card:hover .photo-image .overlay { opacity: 1; }

    .overlay-icon {
      font-size: 36px;
      color: #ffd700;
      transform: scale(0.8);
      transition: transform 0.3s ease;
      filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));
    }

    .photo-card:hover .overlay-icon { transform: scale(1); }

    .cinematic-caption {
      text-align: center;
      margin-top: 8px;
      font-family: monospace;
    }

    .cinematic-caption .scene-number { 
      font-size: 0.6rem; 
      color: #ffd700; 
      letter-spacing: 1px; 
    }

    .cinematic-caption .caption-text { 
      font-size: 0.65rem; 
      color: rgba(255, 255, 255, 0.7); 
      margin-top: 2px; 
      font-weight: 300; 
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-top: 30px;
      position: relative;
      z-index: 2;
      padding: 0 15px;
    }

    .page-btn {
      background: transparent;
      border: 2px solid #ffb83b;
      color: #ffb83b;
      padding: 10px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      min-width: 100px;
      -webkit-tap-highlight-color: transparent;
    }

    .page-btn:hover:not(:disabled) {
      background: #ffb83b;
      color: #000;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 184, 59, 0.3);
    }

    .page-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-indicator {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .page-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .page-dot.active {
      background: #ffb83b;
      transform: scale(1.3);
      box-shadow: 0 0 8px rgba(255, 184, 59, 0.5);
    }

    .page-dot:hover:not(.active) {
      background: rgba(255, 184, 59, 0.5);
      transform: scale(1.1);
    }

    .gallery-grid.page-leaving { 
      opacity: 0; 
      transform: scale(0.98); 
      pointer-events: none; 
    }
    .gallery-grid.page-entering { 
      opacity: 0; 
      transform: scale(0.99); 
    }
    .gallery-grid.page-visible { 
      opacity: 1; 
      transform: scale(1); 
    }

    .footer { 
      text-align: center; 
      padding: 30px 20px; 
      background: #050505; 
      border-top: 1px solid rgba(255, 215, 0, 0.2); 
    }

    .scroll-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ffb83b;

    /* Very small phones */

  <!-- MAIN CONTENT -->
  <div class="main-content" id="mainContent">

      <section class="gallery">
        <div class="stars-container" id="starsContainer"></div>
        
        <div class="container">
          <div class="gallery-header">
            <h2>✦ <span>CINEMATIC</span> MOMENTS ✦</h2>
            <p id="photoCountDisplay">Loading gallery...</p>
          </div>
          <div class="cinema-lights">
            <span></span><span></span><span></span><span></span><span></span>
          </div>

            <button class="page-btn" id="prevBtn">← Previous</button>

  <div class="swipe-hint" id="swipeHint">
    <i class="bi bi-hand-index-thumb"></i> SWIPE <i class="bi bi-arrow-left-right"></i>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/glightbox@3.2.0/dist/js/glightbox.min.js"></script>

  <script>
    // ============================================
    // LOADING SCREEN
    // ============================================
    let progress = 0;
    const progressBar = document.getElementById('progressBar');
    const loadingPercent = document.getElementById('loadingPercent');
    const loadingScreen = document.getElementById('loadingScreen');
    const mainContent = document.getElementById('mainContent');
    const swipeHint = document.getElementById('swipeHint');

    function showSwipeHint() {
      if (swipeHint) {
        swipeHint.classList.add('show');
        setTimeout(() => {
          swipeHint.classList.remove('show');
        }, 3000);
      }
    }

    const loadingInterval = setInterval(() => {
      progress += Math.random() * 15 + 5;
      if (progress >= 100) {
        progress = 100;
        clearInterval(loadingInterval);
        
        progressBar.style.width = '100%';
        loadingPercent.textContent = '100%';
        
        setTimeout(() => {
          loadingScreen.classList.add('hide');
          mainContent.classList.add('show');
          
          initStars();
          loadOfficers();
          loadPage();
          updatePageIndicator();
          updatePhotoCountDisplay();
          initEventListeners();
          showSwipeHint();
        }, 400);
      }
      progressBar.style.width = progress + '%';
      loadingPercent.textContent = Math.floor(progress) + '%';
    }, 150);

    // ============================================
    // STARS
    // ============================================
    function initStars() {
      const container = document.getElementById('starsContainer');
      if (!container) return;
      
      container.innerHTML = '';
      
      const isMobile = window.innerWidth < 768;
      const starCount = isMobile ? 60 : 150;
      const sparkleCount = isMobile ? 20 : 50;
      const shootingStarCount = isMobile ? 3 : 8;
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = Math.random() * 2 + 1 + 'px';
        star.style.height = star.style.width;
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.animationDuration = Math.random() * 3 + 2 + 's';
        container.appendChild(star);
      }
      
      for (let i = 0; i < sparkleCount; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = Math.random() * 100 + '%';
        sparkle.style.top = Math.random() * 100 + '%';
        sparkle.style.animationDelay = Math.random() * 4 + 's';
        sparkle.style.animationDuration = Math.random() * 2 + 1 + 's';
        container.appendChild(sparkle);
      }
      
      for (let i = 0; i < shootingStarCount; i++) {
        const shootingStar = document.createElement('div');
        shootingStar.className = 'shooting-star';
        shootingStar.style.left = Math.random() * 80 + 10 + '%';
        shootingStar.style.top = Math.random() * 50 + '%';
        shootingStar.style.animationDelay = Math.random() * 10 + 's';
        shootingStar.style.animationDuration = Math.random() * 3 + 2 + 's';
        shootingStar.style.width = Math.random() * 40 + 20 + 'px';
        shootingStar.style.height = '2px';
        container.appendChild(shootingStar);
      }
    }

    // ============================================
    // SETTINGS
    // ============================================
    const isMobileDevice = window.innerWidth < 768;
    const PHOTOS_PER_PAGE = isMobileDevice ? 12 : 30;
    const TOTAL_GALLERY_PHOTOS = 120;
    
    const CAPTIONS = [
      "A Moment of Worship 🙏", "A Moment of Fellowship 🤝", "A Moment of Joy 😊",
      "A Moment of Praise 🎵", "A Moment of Prayer 🕯️", "A Moment of Unity 💙",
      "A Moment of Service ❤️", "A Moment of Celebration 🎉", "A Moment of Reflection 🧘",
      "A Moment of Friendship 👭", "A Moment of Growth 🌱", "A Moment of Gratitude 🙌",
      "A Moment of Adventure ⛰️", "A Moment of Peace ✨", "A Moment of Hope 🌟",
      "A Moment of Faith ✝️", "A Moment of Love 💕", "A Moment of Strength 💪",
      "A Moment of Kindness 🤗", "A Moment of Laughter 😂", "A Moment of Courage 🦁",
      "A Moment of Mercy 💝", "A Moment of Grace 🕊️", "A Moment of Victory 🏆"
    ];

    const YOUTH_OFFICERS = [
      { imageNumber: 812, name: "Nickxon Vivero", role: "Former Youth President", bio: "Philippians 4:13 - I can do all things through Christ who strengthens me", focus: { focusX: 50, focusY: 5, scale: 1.05 } },
      { imageNumber: 922, name: "Sit Ador", role: "Former Youth Vice President", bio: "Psalm 23:4 - Yea, though I walk through the valley of the shadow of death, I will fear no evil: for thou art with me; thy rod and thy staff they comfort me.", focus: { focusX: 50, focusY: 5, scale: 1.05 } },
      { imageNumber: 933, name: "Joyce Ann Saballa", role: "Former Youth Secretary", bio: "Colossians 3:17 - And whatever you do in word or deed, do all in the name of the Lord Jesus, giving thanks to God the Father through Him.", focus: { focusX: 48, focusY: 5, scale: 1.08 } },
      { imageNumber: 944, name: "Julie Anne Tabelog", role: "Former Youth Treasurer", bio: "Colossians 3:23 - And whatsoever ye do, do it heartily, as to the Lord, and not unto men", focus: { focusX: 50, focusY: 5, scale: 1.00 } }
    ];

    let currentPageImages = [];
    let currentPageStart = 1;
    let currentPageEnd = 30;

    const TOTAL_PAGES = Math.ceil(TOTAL_GALLERY_PHOTOS / PHOTOS_PER_PAGE);
    let currentPage = 1, isLoading = false, lightbox = null;

    function updatePhotoCountDisplay() {
      const display = document.getElementById('photoCountDisplay');
      if (display) {
        display.innerHTML = `${TOTAL_GALLERY_PHOTOS} scenes | Page ${currentPage} of ${TOTAL_PAGES}`;
      }
    }

    function getCaption(n) { return CAPTIONS[(n - 1) % CAPTIONS.length]; }
    
    function getPageRange() { 
      const s = (currentPage - 1) * PHOTOS_PER_PAGE + 1; 
      return { start: s, end: Math.min(s + PHOTOS_PER_PAGE - 1, TOTAL_GALLERY_PHOTOS) }; 
    }
    
    function updatePageIndicator() {
      const ind = document.getElementById('pageIndicator'); 
      if (!ind) return;
      ind.innerHTML = '';
      const maxDots = isMobileDevice ? Math.min(TOTAL_PAGES, 5) : TOTAL_PAGES;
      const startDot = isMobileDevice ? Math.max(1, currentPage - 2) : 1;
      const endDot = isMobileDevice ? Math.min(TOTAL_PAGES, startDot + 4) : TOTAL_PAGES;
      
      for (let i = startDot; i <= endDot; i++) {
        const d = document.createElement('div'); 
        d.className = 'page-dot' + (i === currentPage ? ' active' : '');
        d.addEventListener('click', () => {
          if (i !== currentPage && !isLoading) {
            currentPage = i;
            loadPage();
          }
        });
        ind.appendChild(d);
      }
    }

    // ============================================
    // IMAGE PATH HELPER
    // ============================================
    function getImagePath(n) {
      return [
        `img/gallery/${n}.jpeg`,
        `img/gallery/${n}.jpg`,
        `img/gallery/${n}.JPG`,
        `img/gallery/${n}.JPEG`
      ];
    }

    // ============================================
    // createPhotoCard
    // ============================================
    async function createPhotoCard(n) {
      const card = document.createElement('div'); 
      card.className = 'photo-card';
      const imgDiv = document.createElement('div'); 
      imgDiv.className = 'photo-image';
      const img = document.createElement('img'); 
      img.alt = `Photo ${n}`;
      img.loading = 'lazy';
      img.decoding = 'async';
      
      const overlay = document.createElement('div'); 
      overlay.className = 'overlay'; 
      overlay.innerHTML = '<i class="bi bi-play-circle overlay-icon"></i>';
      
      const paths = getImagePath(n);
      let currentAttempt = 0;
      
      function tryNextPath() {
        if (currentAttempt < paths.length) {
          img.src = paths[currentAttempt];
          currentAttempt++;
        } else {
          img.src = `https://picsum.photos/seed/${n}/400/225`;
          img.classList.add('error');
        }
      }
      
      img.onerror = function() {
        this.onerror = null;
        tryNextPath();
        if (currentAttempt >= paths.length) {
          this.onerror = function() {
            this.onerror = null;
            this.src = `https://picsum.photos/seed/${n}/400/225`;
            this.classList.add('error');
          };
        }
      };
      
      img.onload = () => { 
        requestAnimationFrame(() => { 
          requestAnimationFrame(() => img.classList.add('loaded')); 
        }); 
      };
      
      tryNextPath();
      
      imgDiv.appendChild(img); 
      imgDiv.appendChild(overlay);
      
      const captionDiv = document.createElement('div'); 
      captionDiv.className = 'cinematic-caption';
      captionDiv.innerHTML = `<div class="scene-number">🎬 SCENE ${String(n).padStart(3, '0')}</div><div class="caption-text">${getCaption(n)}</div>`;
      card.appendChild(imgDiv); 
      card.appendChild(captionDiv);
      
      card.addEventListener('click', (e) => {
        e.preventDefault();
        openLightbox(n);
      });
      
      return card;
    }

    // ============================================
    // LIGHTBOX FUNCTION
    // ============================================
    function openLightbox(n) {
      if (lightbox) {
        lightbox.close();
        lightbox = null;
      }
      
      const { start, end } = getPageRange();
      const allImages = [];
      
      for (let i = start; i <= end; i++) {
        const imgPaths = getImagePath(i);
        allImages.push({ 
          href: imgPaths[0],
          type: 'image/jpeg',
          title: `SCENE ${String(i).padStart(3, '0')} - ${getCaption(i)}`,
          description: `📸 Living Testimonies - Youth Ministry`
        });
      }
      
      const currentIndex = n - start;
      
      lightbox = GLightbox({
        elements: allImages,
        startAt: currentIndex,
        touchNavigation: true,
        loop: true,
        zoomable: true,
        draggable: true,
        swipeTolerance: 50,
        width: '95vw',
        height: '95vh',
        openEffect: 'zoom',
        closeEffect: 'zoom',
        slideEffect: 'fade',
        moreText: 'Read more',
        moreLength: 60,
        closeOnOutsideClick: true,
        onOpen: function() {
          document.body.style.overflow = 'hidden';
        },
        onClose: function() {
          document.body.style.overflow = '';
          lightbox = null;
        }
      });
      
      lightbox.open();
    }

    // ============================================
    // createOfficerCard
    // ============================================
    async function createOfficerCard(o) {
      const card = document.createElement('div'); 
      card.className = 'officer-card';
      const inner = document.createElement('div'); 
      inner.className = 'card-inner';
      const frame = document.createElement('div'); 
      frame.className = 'avatar-frame';
      const avatar = document.createElement('div'); 
      avatar.className = 'avatar';
      const img = document.createElement('img');
      
      img.alt = o.name;
      img.loading = 'lazy';
      img.decoding = 'async';
      img.style.objectPosition = `${o.focus?.focusX ?? 50}% ${o.focus?.focusY ?? 50}%`;
      img.style.objectFit = 'cover';
      
      const paths = getImagePath(o.imageNumber);
      let currentAttempt = 0;
      
      function tryNextPath() {
        if (currentAttempt < paths.length) {
          img.src = paths[currentAttempt];
          currentAttempt++;
        } else {
          img.src = `https://picsum.photos/seed/${o.imageNumber}/400/400`;
        }
      }
      
      img.onerror = function() {
        this.onerror = null;
        tryNextPath();
        if (currentAttempt >= paths.length) {
          this.onerror = function() {
            this.onerror = null;
            this.src = `https://picsum.photos/seed/${o.imageNumber}/400/400`;
          };
        }
      };
      
      tryNextPath();
      
      const ring = document.createElement('div'); 
      ring.className = 'avatar-ring';
      const dot = document.createElement('div'); 
      dot.className = 'hover-dot';
      avatar.appendChild(img); 
      avatar.appendChild(ring); 
      avatar.appendChild(dot);
      frame.appendChild(avatar);
      const info = document.createElement('div'); 
      info.className = 'officer-info';
      info.innerHTML = `<h3>${o.name}</h3><div class="role">${o.role}</div><div class="bio">${o.bio}</div>`;
      inner.appendChild(frame); 
      inner.appendChild(info); 
      card.appendChild(inner);
      return card;
    }

    async function loadPage() {
      if (isLoading) return; 
      isLoading = true;
      const prev = document.getElementById('prevBtn'), next = document.getElementById('nextBtn'), grid = document.getElementById('galleryGrid');
      prev.disabled = true; 
      next.disabled = true;
      grid.classList.remove('page-visible', 'page-entering'); 
      grid.classList.add('page-leaving');
      await new Promise(r => setTimeout(r, 200));
      const { start, end } = getPageRange(); 
      const cards = [];
      currentPageImages = [];
      
      for (let i = start; i <= end; i++) {
        cards.push(await createPhotoCard(i));
        const paths = getImagePath(i);
        currentPageImages.push(paths[0]);
      }
      currentPageStart = start;
      currentPageEnd = end;
      
      grid.innerHTML = ''; 
      cards.forEach(c => grid.appendChild(c));
      grid.classList.remove('page-leaving'); 
      grid.classList.add('page-entering');
      requestAnimationFrame(() => { 
        requestAnimationFrame(() => { 
          grid.classList.remove('page-entering'); 
          grid.classList.add('page-visible'); 
        }); 
      });
      prev.disabled = currentPage === 1; 
      next.disabled = currentPage === TOTAL_PAGES;
      updatePageIndicator(); 
      updatePhotoCountDisplay();
      isLoading = false;
    }

    async function loadOfficers() { 
      const grid = document.getElementById('officersGrid'); 
      if (!grid) return; 
      grid.innerHTML = ''; 
      for (const o of YOUTH_OFFICERS) grid.appendChild(await createOfficerCard(o)); 
    }
    
    function nextPage() { 
      if (currentPage < TOTAL_PAGES && !isLoading) { 
        currentPage++; 
        loadPage(); 
        const grid = document.getElementById('galleryGrid');
        if (grid) {
          const rect = grid.getBoundingClientRect();
          const offset = window.innerWidth < 768 ? 60 : 80;
          window.scrollTo({ top: window.scrollY + rect.top - offset, behavior: 'smooth' });
        }
      } 
    }
    
    function prevPage() { 
      if (currentPage > 1 && !isLoading) { 
        currentPage--; 
        loadPage(); 
        const grid = document.getElementById('galleryGrid');
        if (grid) {
          const rect = grid.getBoundingClientRect();
          const offset = window.innerWidth < 768 ? 60 : 80;
          window.scrollTo({ top: window.scrollY + rect.top - offset, behavior: 'smooth' });
        }
      } 
    }
    
    function initMobileMenu() { 
      const btn = document.getElementById('mobileBtn'), menu = document.getElementById('navLinks'); 
      if (btn && menu) { 
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          menu.classList.toggle('active');
        }); 
        menu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => menu.classList.remove('active'))); 
        document.addEventListener('click', (e) => {
          if (!menu.contains(e.target) && e.target !== btn) {
            menu.classList.remove('active');
          }
        });
      } 
    }
    
    function initScrollTop() { 
      const st = document.getElementById('scrollTop'); 
      if (!st) return; 
      window.addEventListener('scroll', () => st.classList.toggle('active', window.scrollY > 300), { passive: true }); 
      st.addEventListener('click', e => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }); 
    }

    function initNavbarScroll() {
      const navbar = document.getElementById('navbar');
      window.addEventListener('scroll', function() {
        if (window.scrollY > 40) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      }, { passive: true });
    }
    
    function initEventListeners() {
      document.getElementById('prevBtn').addEventListener('click', prevPage); 
      document.getElementById('nextBtn').addEventListener('click', nextPage); 
      
      // Touch support for mobile
      let touchStartX = 0;
      let touchEndX = 0;
      document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
      }, { passive: true });
      
      document.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        const diff = touchStartX - touchEndX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) {
            nextPage();
          } else {
            prevPage();
          }
        }
      }, { passive: true });
      
      // Keyboard support
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') {
          if (!isLoading) nextPage();
        } else if (e.key === 'ArrowLeft') {
          if (!isLoading) prevPage();
        } else if (e.key === 'Escape') {
          if (lightbox) {
            lightbox.close();
            lightbox = null;
          }
        }
      });
      
      initMobileMenu(); 
      initScrollTop();
      initNavbarScroll(); 
    }

    // Handle resize
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        const newIsMobile = window.innerWidth < 768;
        if (newIsMobile !== (PHOTOS_PER_PAGE === 12)) {
          location.reload();
        }
      }, 500);
    }, { passive: true });
  </script>
</body>
